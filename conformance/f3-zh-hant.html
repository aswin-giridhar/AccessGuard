<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>停車許可證申請 — 區議會網站</title>
</head>
<body>
  <h1>停車許可證申請</h1>
  <h2>為區內居民辦理長期許可證</h2>

  <img src="/images/street.png" alt="設有許可證停車格的街道相片">

  <form action="/apply">
    <label for="area">請問您所屬的區域</label>
    <input type="text" id="area" name="area">
    <button type="submit">立即申請</button>
  </form>

  <p style="color:#1a1a1a;background-color:#ffffff">
    許可證會在收到完整申請後的十個工作天內發出，請經由網站查閱詳細說明與相關規定。
  </p>

  <a href="/details">閱讀完整的許可證說明</a>
</body>
</html>
