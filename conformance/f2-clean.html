<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Southwark Council — Parking Permits</title>
</head>
<body>
  <h1>Parking Permits</h1>
  <h2>Apply for a resident permit</h2>

  <img src="/images/hero-banner.png" alt="A residential street with permit-holder parking bays">

  <form action="/apply">
    <label for="postcode">Postcode</label>
    <input type="text" id="postcode" name="postcode">
    <button type="submit">Apply now</button>
  </form>

  <p style="color:#1a1a1a;background-color:#ffffff">
    Permits are issued within 10 working days of a completed application.
  </p>

  <a href="/permits/details">Read the full permit guidance</a>
</body>
</html>
